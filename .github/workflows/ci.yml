name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
# `main` is excluded so pushes to main never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  # Shared flags so every `npm ci` is fast and quiet.
  #  --prefer-offline    — use the tarball cache populated by setup-node
  #  --no-audit          — skip the security audit network call on every CI run
  #  --no-fund           — suppress funding messages
  NPM_CI_FLAGS: --prefer-offline --no-audit --no-fund

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run typecheck

  test:
    name: Test (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # CI builds skip Stripe price-ID validation — we're verifying the app
      # compiles, not that prod Stripe configuration is present.
      SKIP_STRIPE_VALIDATION: 'true'
      # Supabase public vars are required by next.config.mjs validateBuildEnv().
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Verify required build secrets are set
        if: env.NEXT_PUBLIC_SUPABASE_URL == '' || env.NEXT_PUBLIC_SUPABASE_ANON_KEY == ''
        run: |
          echo "::error::Missing required GitHub Actions secret(s): NEXT_PUBLIC_SUPABASE_URL and/or NEXT_PUBLIC_SUPABASE_ANON_KEY"
          echo "Add them under repo Settings → Secrets and variables → Actions."
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.mjs', 'tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            next-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.mjs', 'tsconfig.json') }}-
      - run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - name: Run npm audit
        run: |
          # next@14 has known advisories with no patch below v16 (breaking).
          # Track upgrade in a separate issue; exclude these for now.
          npm audit --audit-level=high 2>&1 | tee /tmp/audit.txt || true
          # Fail only if vulnerabilities exist beyond the known next@14 advisory
          if grep -q 'found 0 vulnerabilities' /tmp/audit.txt; then
            echo "No vulnerabilities found."
          elif grep -q 'node_modules/next' /tmp/audit.txt && [ "$(npm audit --json 2>/dev/null | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const vulns = Object.keys(d.vulnerabilities || {});
            const nonNext = vulns.filter(v => v !== 'next');
            console.log(nonNext.length);
          ")" = "0" ]; then
            echo "Only known next@14 advisories remain — passing."
          else
            echo "::error::Unexpected audit vulnerabilities found"
            exit 1
          fi

  # Aggregate status check so branch protection can require a single
  # "CI / All Checks" check instead of listing every job. Update the
  # `needs` list when jobs are added or removed.
  all-checks:
    name: All Checks
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, security-audit]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS"
          if echo "$RESULTS" | grep -q '"result": "failure"'; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"result": "cancelled"'; then
            echo "::error::One or more required jobs were cancelled"
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"result": "skipped"'; then
            echo "::error::One or more required jobs were skipped"
            exit 1
          fi
          echo "All required jobs succeeded."
