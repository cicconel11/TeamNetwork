name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
# `main` is excluded so pushes to main never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  # Shared flags so every `npm ci` is fast and quiet.
  #  --prefer-offline    — use the tarball cache populated by setup-node
  #  --no-audit          — skip the security audit network call on every CI run
  #  --no-fund           — suppress funding messages
  NPM_CI_FLAGS: --prefer-offline --no-audit --no-fund

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run typecheck

  test:
    name: Test (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm test

  test-unit:
    name: Test (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run test:unit

  test-ai:
    name: Test (AI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - run: npm run test:ai

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # CI builds skip Stripe price-ID validation — we're verifying the app
      # compiles, not that prod Stripe configuration is present.
      SKIP_STRIPE_VALIDATION: 'true'
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.mjs', 'tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            next-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.mjs', 'tsconfig.json') }}-
      # next.config.mjs always validates these. They are public in the browser anyway;
      # use repo secrets when set, otherwise compile-only placeholders (no real project).
      - name: Configure Supabase public env for build
        env:
          URL_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          KEY_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          DEFAULT_URL="https://ci-build-placeholder.supabase.co"
          DEFAULT_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
          if [ -z "${URL_SECRET:-}" ]; then
            echo "::notice::NEXT_PUBLIC_SUPABASE_URL secret unset — using CI placeholder for compile-only build."
            echo "NEXT_PUBLIC_SUPABASE_URL=$DEFAULT_URL" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_SUPABASE_URL=$URL_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -z "${KEY_SECRET:-}" ]; then
            echo "::notice::NEXT_PUBLIC_SUPABASE_ANON_KEY secret unset — using CI placeholder for compile-only build."
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$DEFAULT_ANON" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$KEY_SECRET" >> "$GITHUB_ENV"
          fi
      - run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci $NPM_CI_FLAGS
      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # Aggregate status check so branch protection can require a single
  # "CI / All Checks" check instead of listing every job. Update the
  # `needs` list when jobs are added or removed.
  all-checks:
    name: All Checks
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-unit, test-ai, build, security-audit]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS"
          if echo "$RESULTS" | grep -q '"result": "failure"'; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"result": "cancelled"'; then
            echo "::error::One or more required jobs were cancelled"
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"result": "skipped"'; then
            echo "::error::One or more required jobs were skipped"
            exit 1
          fi
          echo "All required jobs succeeded."
